kind = "web"
previewPath = "/"
title = "Gard Security"
version = "1.0.0"
id = "artifacts/gard-security"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18896

[services.development]
run = "pnpm --filter @workspace/gard-security run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gard-security", "run", "build" ]
publicDir = "artifacts/gard-security/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18896"
BASE_PATH = "/"
